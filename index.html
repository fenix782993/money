<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fenix Combat Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0d101d;
            --panel-bg: #151a2e;
            --border-color: #222b45;
            --accent-blue: #0088cc;
            --neon-glow: #00f0ff;
            --text-muted: #6b7c96;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* ТОР-Панель (Прибыль, Лиги) */
        .top-bar {
            background: linear-gradient(180deg, #161c33 0%, var(--bg-color) 100%);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        .league-badge {
            background: rgba(0, 240, 255, 0.1);
            border: 1px solid var(--neon-glow);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            color: var(--neon-glow);
            text-transform: uppercase;
        }

        .stats-container {
            display: flex;
            gap: 15px;
        }

        .stat-box {
            text-align: right;
        }

        .stat-box .val {
            font-size: 14px;
            font-weight: bold;
            color: #fff;
        }

        .stat-box .lbl {
            font-size: 10px;
            color: var(--text-muted);
        }

        /* Контентная зона */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: none;
        }

        .main-content.active {
            display: block;
        }

        /* ЭКРАН 1: КЛИКЕР */
        #screen-clicker {
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: calc(100vh - 150px);
        }

        .score-container {
            margin-top: 15px;
        }

        .score-title {
            font-size: 11px;
            color: var(--neon-glow);
            letter-spacing: 1.5px;
            font-weight: bold;
        }

        .score-val {
            font-size: 44px;
            font-weight: 900;
            margin-top: 5px;
            background: linear-gradient(180deg, #ffffff 0%, #a6c0fe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(0,240,255,0.2));
        }

        .circle-wrapper {
            margin: auto;
            position: relative;
            width: 250px;
            height: 250px;
        }

        .click-circle {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle, #1f294d 0%, #0a0e1a 100%);
            border: 5px solid #1c233d;
            box-shadow: 0 0 40px rgba(0, 136, 204, 0.3), inset 0 0 20px rgba(0, 240, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.05s ease;
        }

        .click-circle:active {
            transform: scale(0.96);
            border-color: var(--neon-glow);
        }

        .click-circle span {
            font-size: 100px;
            filter: drop-shadow(0 0 20px rgba(0,240,255,0.4));
        }

        .energy-container {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            padding: 10px 16px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .energy-text {
            font-size: 13px;
            font-weight: bold;
        }

        .energy-bar {
            width: 120px;
            height: 6px;
            background: #222b45;
            border-radius: 4px;
            overflow: hidden;
        }

        .energy-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #0088cc, var(--neon-glow));
            transition: width 0.2s;
        }

        /* ЭКРАН 2: УЛУЧШЕНИЯ / КАТЕГОРИИ */
        .sub-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }

        .sub-tab-btn {
            flex: 1;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 8px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
        }

        .sub-tab-btn.active {
            background: var(--accent-blue);
            color: #fff;
            border-color: var(--neon-glow);
        }

        .cards-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding-bottom: 30px;
        }

        .card {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
        }

        .card-lvl {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 10px;
            background: #222b45;
            padding: 2px 6px;
            border-radius: 6px;
            color: var(--neon-glow);
        }

        .card-icon {
            font-size: 24px;
            margin-bottom: 6px;
        }

        .card-name {
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .card-profit-lbl {
            font-size: 10px;
            color: var(--text-muted);
        }

        .card-profit-val {
            font-size: 11px;
            color: #00ffaa;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .card-buy-btn {
            width: 100%;
            background: #1e2746;
            border: 1px solid #2d3a66;
            color: #fff;
            padding: 8px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 4px;
        }

        .card-buy-btn:active:not(:disabled) {
            background: var(--accent-blue);
        }

        .card-buy-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* ЭКРАН 3: ПРОФИЛЬ И АДМИНКА */
        .profile-card {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .admin-panel {
            background: #21101a;
            border: 1px solid #ff0055;
            border-radius: 16px;
            padding: 16px;
            margin-top: 20px;
            display: none;
        }

        .admin-title {
            color: #ff0055;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
        }

        .admin-btn {
            background: #ff0055;
            color: #fff;
            border: none;
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
            margin-right: 5px;
            margin-bottom: 5px;
        }

        /* МЕНЮ НАВИГАЦИИ (НИЖНЕЕ) */
        .nav-menu {
            background: #11162a;
            border-top: 1px solid var(--border-color);
            display: flex;
            height: 68px;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .nav-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
        }

        .nav-btn.active {
            color: var(--neon-glow);
            background: linear-gradient(180deg, rgba(0,240,255,0.02) 0%, rgba(0,0,0,0) 100%);
        }

        .nav-btn-icon {
            font-size: 18px;
            margin-bottom: 3px;
        }

        /* Поле ввода промокодов */
        .input-group {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .input-field {
            flex: 1;
            background: #090d1a;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px;
            color: #fff;
            outline: none;
        }

        .action-btn {
            background: var(--accent-blue);
            border: none;
            color: #fff;
            padding: 10px 16px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="league-badge" id="player-league">Ранг: 1</div>
        <div class="stats-container">
            <div class="stat-box">
                <div class="val" id="top-mult">+1</div>
                <div class="lbl">За тап</div>
            </div>
            <div class="stat-box">
                <div class="val" id="top-pph">+0</div>
                <div class="lbl">В час</div>
            </div>
        </div>
    </div>

    <div id="screen-clicker" class="main-content active">
        <div class="score-container">
            <div class="score-title">БАЛАНС МАНЕЙ</div>
            <div class="score-val" id="display-balance">0</div>
        </div>

        <div class="circle-wrapper">
            <div class="click-circle" id="main-tap-target">
                <span>🦅</span>
            </div>
        </div>

        <div class="energy-container">
            <div style="display: flex; align-items: center; gap: 8px;">
                <span>⚡</span>
                <div class="energy-text"><span id="current-energy">3000</span>/<span id="max-energy">3000</span></div>
            </div>
            <div class="energy-bar">
                <div class="energy-fill" id="energy-fill-bar"></div>
            </div>
        </div>
    </div>

    <div id="screen-upgrades" class="main-content">
        <div class="sub-tabs">
            <button class="sub-tab-btn active" onclick="switchCategory('cat-markets', this)">Markets</button>
            <button class="sub-tab-btn" onclick="switchCategory('cat-team', this)">PR&Team</button>
            <button class="sub-tab-btn" onclick="switchCategory('cat-legal', this)">Legal</button>
        </div>

        <div id="cat-markets" class="category-block">
            <div class="cards-grid" id="grid-markets"></div>
        </div>

        <div id="cat-team" class="category-block" style="display:none;">
            <div class="cards-grid" id="grid-team"></div>
        </div>

        <div id="cat-legal" class="category-block" style="display:none;">
            <div class="cards-grid" id="grid-legal"></div>
        </div>
    </div>

    <div id="screen-profile" class="main-content">
        <div class="profile-card">
            <h3 style="margin-bottom: 8px; color: var(--neon-glow)">Личный Профиль</h3>
            <p style="font-size: 13px; color: var(--text-muted)">Статус владельца: <span style="color:#fff">CEO Fenix Corp</span></p>
            <p style="font-size: 13px; color: var(--text-muted); margin-top: 4px;">Текущий уровень титула: <span id="profile-title-num" style="color:var(--neon-glow)">1/250</span></p>
        </div>

        <div class="profile-card">
            <h3 style="font-size: 14px; margin-bottom: 8px;">Ввести Секретный Промокод</h3>
            <div class="input-group">
                <input type="text" id="promo-field" class="input-field" placeholder="КОД...">
                <button class="action-btn" onclick="usePromoCode()">Ввод</button>
            </div>
        </div>

        <div class="admin-panel" id="admin-zone">
            <div class="admin-title">
                <span>Панель Создателя (Админка)</span>
                <span style="cursor:pointer" onclick="document.getElementById('admin-zone').style.display='none'">❌</span>
            </div>
            <button class="admin-btn" onclick="adminGiveMoney()">+1,000,000 Монет</button>
            <button class="admin-btn" onclick="adminGivePPH()">+50,000 в час</button>
            <button class="admin-btn" onclick="adminResetAll()" style="background:#330011; border:1px solid #ff0055;">Полный вайп данных</button>
        </div>
    </div>

    <div class="nav-menu">
        <div class="nav-btn active" onclick="navigate('screen-clicker', this)">
            <div class="nav-btn-icon">🪙</div>
            <div>Exchange</div>
        </div>
        <div class="nav-btn" onclick="navigate('screen-upgrades', this)">
            <div class="nav-btn-icon">⛏️</div>
            <div>Mine</div>
        </div>
        <div class="nav-btn" onclick="navigate('screen-profile', this)">
            <div class="nav-btn-icon">👤</div>
            <div>Profile</div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Данные игры
        let game = JSON.parse(localStorage.getItem('f_combat_v2')) || {
            balance: 0,
            pph: 0,
            mult: 1,
            energy: 3000,
            maxEnergy: 3000,
            cards: {}
        };

        // Конфигурация карточек (12 штук как в Хамстере)
        const CARDS_DATA = [
            { id: 'm_btc', name: 'BTC Pairs', basePrice: 100, baseProfit: 15, cat: 'markets', icon: '₿' },
            { id: 'm_eth', name: 'ETH Pairs', basePrice: 500, baseProfit: 75, cat: 'markets', icon: '♦' },
            { id: 'm_sol', name: 'SOL Pairs', basePrice: 2000, baseProfit: 320, cat: 'markets', icon: '☀️' },
            { id: 'm_meme', name: 'Meme Coins', basePrice: 8000, baseProfit: 1100, cat: 'markets', icon: '🐕' },
            
            { id: 't_tg', name: 'Telegram Channel', basePrice: 200, baseProfit: 25, cat: 'team', icon: '📢' },
            { id: 't_youtube', name: 'YouTube Show', basePrice: 1000, baseProfit: 140, cat: 'team', icon: '🎬' },
            { id: 't_tiktok', name: 'TikTok Viral', basePrice: 4000, baseProfit: 550, cat: 'team', icon: '🎵' },
            { id: 't_reddit', name: 'Reddit Community', basePrice: 15000, baseProfit: 2100, cat: 'team', icon: '🤖' },
            
            { id: 'l_kyc', name: 'KYC Verification', basePrice: 1000, baseProfit: 130, cat: 'legal', icon: '🆔' },
            { id: 'l_sec', name: 'SEC License', basePrice: 5000, baseProfit: 680, cat: 'legal', icon: '⚖️' },
            { id: 'l_dubai', name: 'Dubai Office', basePrice: 25000, baseProfit: 3500, cat: 'legal', icon: '🏢' },
            { id: 'l_bank', name: 'Crypto Bank Corp', basePrice: 100000, baseProfit: 15000, cat: 'legal', icon: '🏦' }
        ];

        // Первичная инициализация структуры карточек
        CARDS_DATA.forEach(c => {
            if (game.cards[c.id] === undefined) game.cards[c.id] = 0;
        });

        // Расчет титулов (200+ уровней)
        function getTitleInfo(bal) {
            let lvl = Math.floor(Math.sqrt(bal / 50)) + 1;
            if (lvl > 250) lvl = 250; 
            
            let name = "Новичок";
            if (lvl > 20) name = "Менеджер";
            if (lvl > 50) name = "Инвестор";
            if (lvl > 90) name = "Магнат";
            if (lvl > 140) name = "Грандмастер";
            if (lvl > 200) name = "Крипто Лорд";
            
            return { lvl: lvl, text: `${name} (${lvl} ур)` };
        }

        function save() {
            localStorage.setItem('f_combat_v2', JSON.stringify(game));
        }

        function updateUI() {
            document.getElementById('display-balance').innerText = Math.floor(game.balance).toLocaleString();
            document.getElementById('top-mult').innerText = '+' + game.mult;
            document.getElementById('top-pph').innerText = '+' + game.pph.toLocaleString();
            document.getElementById('current-energy').innerText = Math.floor(game.energy);
            document.getElementById('max-energy').innerText = game.maxEnergy;
            
            let fillPct = (game.energy / game.maxEnergy) * 100;
            document.getElementById('energy-fill-bar').style.width = fillPct + '%';

            let tInfo = getTitleInfo(game.balance);
            document.getElementById('player-league').innerText = tInfo.text;
            document.getElementById('profile-title-num').innerText = tInfo.lvl + " / 250";
        }

        // Рендеринг карточек
        function renderCards() {
            const grids = { markets: 'grid-markets', team: 'grid-team', legal: 'grid-legal' };
            Object.values(grids).forEach(id => document.getElementById(id).innerHTML = '');

            CARDS_DATA.forEach(c => {
                let currentLvl = game.cards[c.id] || 0;
                // Формула удорожания: базовая цена * 1.6 в степени уровня
                let currentPrice = Math.floor(c.basePrice * Math.pow(1.6, currentLvl));
                let currentProfit = c.baseProfit * (currentLvl + 1);

                let cardHtml = `
                    <div class="card">
                        <div class="card-lvl">Lvl ${currentLvl}</div>
                        <div class="card-icon">${c.icon}</div>
                        <div class="card-name">${c.name}</div>
                        <div class="card-profit-lbl">Прибыль в час</div>
                        <div class="card-profit-val">+${currentProfit}</div>
                        <button class="card-buy-btn" id="btn-${c.id}" onclick="buyUpgrade('${c.id}', ${currentPrice}, ${c.baseProfit})">
                            🪙 ${currentPrice.toLocaleString()}
                        </button>
                    </div>
                `;
                document.getElementById(grids[c.cat]).insertAdjacentHTML('beforeend', cardHtml);
                
                if(game.balance < currentPrice) {
                    document.getElementById(`btn-${c.id}`).disabled = true;
                }
            });
        }

        // Покупка апгрейда
        window.buyUpgrade = function(id, price, profitAdd) {
            if (game.balance >= price) {
                game.balance -= price;
                game.cards[id]++;
                game.pph += profitAdd;
                save();
                updateUI();
                renderCards();
            }
        };

        // Клик по экрану
        document.getElementById('main-tap-target').addEventListener('click', () => {
            if (game.energy >= game.mult) {
                game.energy -= game.mult;
                game.balance += game.mult;
                updateUI();
                save();
            }
        });

        // Навигация по вкладкам меню
        window.navigate = function(screenId, element) {
            document.querySelectorAll('.main-content').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            element.classList.add('active');
            if (screenId === 'screen-upgrades') renderCards();
        };

        // Переключение подкатегорий карточек (Markets, Team, Legal)
        window.switchCategory = function(catId, element) {
            document.querySelectorAll('.category-block').forEach(b => b.style.display = 'none');
            document.querySelectorAll('.sub-tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(catId).style.display = 'block';
            element.classList.add('active');
        };

        // Логика промокодов и админки
        window.usePromoCode = function() {
            let code = document.getElementById('promo-field').value.trim();
            if (code === 'ADMIN1337') {
                document.getElementById('admin-zone').style.display = 'block';
                alert('Доступ разработчика активирован!');
            } else if (code === 'FENIX2026') {
                game.balance += 50000;
                save(); updateUI();
                alert('Промокод принят: +50,000 монет!');
            } else {
                alert('Неверный код!');
            }
            document.getElementById('promo-field').value = '';
        };

        // Функции панели администратора
        window.adminGiveMoney = function() { game.balance += 1000000; save(); updateUI(); };
        window.adminGivePPH = function() { game.pph += 50000; save(); updateUI(); };
        window.adminResetAll = function() { localStorage.removeItem('f_combat_v2'); location.reload(); };

        // Игровые таймеры (Пассивный доход и восстановление энергии)
        setInterval(() => {
            // Пассивный доход в секунду
            if (game.pph > 0) {
                game.balance += (game.pph / 3600);
            }
            // Регенерация энергии (+3 в сек)
            if (game.energy < game.maxEnergy) {
                game.energy = Math.min(game.maxEnergy, game.energy + 3);
            }
            updateUI();
            save();
        }, 1000);

        updateUI();
    </script>
</body>
</html>
