<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fenix Combat Ultimate Owner Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0c0806;
            --panel-bg: #1a110b;
            --border-color: #331f14;
            --accent-orange: #ff6a00;
            --neon-gold: #ffd700;
            --text-muted: #8c7363;
            --lock-color: #ff3b30;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .top-bar {
            background: linear-gradient(180deg, #26160c 0%, var(--bg-color) 100%);
            padding: 14px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        .league-badge {
            background: rgba(255, 106, 0, 0.1);
            border: 1px solid var(--accent-orange);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            color: var(--neon-gold);
            text-transform: uppercase;
            box-shadow: 0 0 10px rgba(255, 106, 0, 0.2);
        }

        .stats-container {
            display: flex;
            gap: 14px;
        }

        .stat-box {
            text-align: right;
        }

        .stat-box .val {
            font-size: 13px;
            font-weight: bold;
            color: #ffffff;
        }

        .stat-box .lbl {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: none;
        }

        .main-content.active {
            display: block;
        }

        #screen-clicker {
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: calc(100vh - 150px);
        }

        .score-container {
            margin-top: 10px;
        }

        .score-title {
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 2px;
        }

        .score-val {
            font-size: 44px;
            font-weight: 900;
            margin-top: 4px;
            background: linear-gradient(180deg, #ffffff 0%, var(--neon-gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 12px rgba(255,106,0,0.3));
        }

        .circle-wrapper {
            margin: auto;
            position: relative;
            width: 230px;
            height: 230px;
        }

        .click-circle {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle, #3a1a05 0%, #0c0806 100%);
            border: 4px solid #4a270f;
            box-shadow: 0 0 40px rgba(255, 106, 0, 0.4), inset 0 0 20px rgba(255, 215, 0, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.05s ease;
            overflow: hidden;
        }

        .click-circle:active {
            transform: scale(0.95);
            border-color: var(--neon-gold);
        }

        .click-circle img {
            width: 85%;
            height: 85%;
            object-fit: contain;
            filter: drop-shadow(0 0 25px rgba(255,106,0,0.6));
        }

        .energy-container {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            padding: 12px 16px;
            border-radius: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .energy-text {
            font-size: 13px;
            font-weight: bold;
        }

        .energy-bar {
            width: 120px;
            height: 7px;
            background: #24160e;
            border-radius: 5px;
            overflow: hidden;
        }

        .energy-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, var(--accent-orange), var(--neon-gold));
        }

        .sub-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 16px;
        }

        .sub-tab-btn {
            flex: 1;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 10px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: bold;
        }

        .sub-tab-btn.active {
            background: var(--accent-orange);
            color: #fff;
            border-color: var(--neon-gold);
        }

        .cards-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding-bottom: 40px;
        }

        .card {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
        }

        .card.locked {
            border-color: var(--lock-color);
            background: #240f11;
        }

        .card-lvl {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 10px;
            background: #2d1b10;
            padding: 3px 6px;
            border-radius: 6px;
            color: var(--neon-gold);
            font-weight: bold;
        }

        .card-img-wrapper {
            width: 100%;
            height: 70px;
            border-radius: 8px;
            overflow: hidden;
            background: #0c0806;
            margin-bottom: 6px;
        }

        .card-img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-name {
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .card-desc {
            font-size: 9px;
            color: var(--text-muted);
            margin-bottom: 6px;
            line-height: 1.2;
        }

        .card-profit-val {
            font-size: 11px;
            color: #00ffaa;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .card-buy-btn {
            width: 100%;
            background: #2b1a10;
            border: 1px solid #4a2c1b;
            color: #fff;
            padding: 9px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
        }

        .card-buy-btn:disabled {
            background: #1f0d0e;
            border-color: #421619;
            color: var(--lock-color);
            cursor: not-allowed;
        }

        .profile-card {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .admin-panel {
            background: #240808;
            border: 2px solid var(--accent-orange);
            border-radius: 16px;
            padding: 16px;
            margin-top: 15px;
            display: none;
            box-shadow: 0 0 15px rgba(255, 106, 0, 0.2);
        }

        .admin-btn {
            background: var(--accent-orange);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 11px;
            margin-right: 6px;
            margin-bottom: 6px;
            cursor: pointer;
        }

        .nav-menu {
            background: #0c0806;
            border-top: 1px solid var(--border-color);
            display: flex;
            height: 68px;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .nav-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 11px;
            font-weight: bold;
        }

        .nav-btn.active {
            color: var(--neon-gold);
            background: linear-gradient(180deg, rgba(255,106,0,0.03) 0%, rgba(0,0,0,0) 100%);
        }

        .nav-btn-icon {
            font-size: 19px;
            margin-bottom: 2px;
        }

        .input-group {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .input-field {
            flex: 1;
            background: #0c0806;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px;
            color: #fff;
            outline: none;
        }

        .action-btn {
            background: var(--accent-orange);
            border: none;
            color: white;
            padding: 10px 16px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="league-badge" id="player-league">Загрузка...</div>
        <div class="stats-container">
            <div class="stat-box">
                <div class="val" id="top-mult">+1</div>
                <div class="lbl">За тап</div>
            </div>
            <div class="stat-box">
                <div class="val" id="top-pph">+0</div>
                <div class="lbl">В час</div>
            </div>
        </div>
    </div>

    <div id="screen-clicker" class="main-content active">
        <div class="score-container">
            <div class="score-title">БАЛАНС МАНЕЙ</div>
            <div class="score-val" id="display-balance">0</div>
        </div>

        <div class="circle-wrapper">
            <div class="click-circle" id="main-tap-target">
                <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&w=400&q=80" alt="Fenix">
            </div>
        </div>

        <div class="energy-container">
            <div style="display: flex; align-items: center; gap: 8px;">
                <span>🔥</span>
                <div class="energy-text"><span id="current-energy">3000</span>/<span id="max-energy">3000</span></div>
            </div>
            <div class="energy-bar">
                <div class="energy-fill" id="energy-fill-bar"></div>
            </div>
        </div>
    </div>

    <div id="screen-upgrades" class="main-content">
        <div class="sub-tabs">
            <button class="sub-tab-btn active" onclick="switchCategory('cat-markets', this)">Markets</button>
            <button class="sub-tab-btn" onclick="switchCategory('cat-team', this)">PR&Team</button>
            <button class="sub-tab-btn" onclick="switchCategory('cat-legal', this)">Legal</button>
        </div>

        <div id="cat-markets" class="category-block">
            <div class="cards-grid" id="grid-markets"></div>
        </div>
        <div id="cat-team" class="category-block" style="display:none;">
            <div class="cards-grid" id="grid-team"></div>
        </div>
        <div id="cat-legal" class="category-block" style="display:none;">
            <div class="cards-grid" id="grid-legal"></div>
        </div>
    </div>

    <div id="screen-profile" class="main-content">
        <div class="profile-card">
            <h3 style="margin-bottom: 6px; color: var(--neon-gold)">CEO Панель</h3>
            <p style="font-size: 13px;">Твой ID: <span id="user-id-display" style="color:#fff">-</span></p>
            <p style="font-size: 13px; margin-top: 4px;">Лига Феникса: <span id="profile-title-num" style="color:var(--accent-orange)">1/250</span></p>
        </div>

        <div class="profile-card">
            <h3 style="font-size: 14px; margin-bottom: 8px;">Активация Промокода</h3>
            <div class="input-group">
                <input type="text" id="promo-field" class="input-field" placeholder="Введи промокод">
                <button class="action-btn" onclick="usePromoCode()">Ввод</button>
            </div>
        </div>

        <div class="admin-panel" id="admin-zone">
            <h3 style="color:var(--neon-gold); margin-bottom:12px; font-size:14px;">🔥 ПАНЕЛЬ СОЗДАТЕЛЯ ИГРЫ (810823857)</h3>
            
            <div style="margin-bottom: 12px;">
                <button class="admin-btn" onclick="adminGiveMoney(5000000)">+5М Маней</button>
                <button class="admin-btn" onclick="adminGiveMoney(100000000)">+100М Маней</button>
                <button class="admin-btn" onclick="adminGivePPH(500000)">+500К/час</button>
                <button class="admin-btn" onclick="adminResetAll()" style="background:#4d1010;">Вайпнуть всё</button>
            </div>

            <div style="border-top: 1px solid var(--border-color); padding-top: 10px;">
                <p style="font-size: 12px; margin-bottom: 6px; color: var(--neon-gold);">Создать кастомный промокод для людей:</p>
                <input type="text" id="adm-promo-name" class="input-field" placeholder="Название (напр. GIFT)" style="margin-bottom:6px;">
                <input type="number" id="adm-promo-reward" class="input-field" placeholder="Сумма награды">
                <button class="action-btn" style="width:100%; margin-top:6px;" onclick="adminCreatePromo()">Выпустить Промокод</button>
            </div>
        </div>
    </div>

    <div class="nav-menu">
        <div class="nav-btn active" onclick="navigate('screen-clicker', this)">
            <div class="nav-btn-icon">🪙</div>
            <div>Exchange</div>
        </div>
        <div class="nav-btn" onclick="navigate('screen-upgrades', this)">
            <div class="nav-btn-icon">⛏️</div>
            <div>Mine</div>
        </div>
        <div class="nav-btn" onclick="navigate('screen-profile', this)">
            <div class="nav-btn-icon">👤</div>
            <div>Profile</div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const OWNER_ID = 810823857;
        let userId = tg.initDataUnsafe?.user?.id || 0;
        document.getElementById('user-id-display').innerText = userId || "Браузер";

        let game = JSON.parse(localStorage.getItem('f_combat_v5_ultimate')) || {
            balance: 0,
            pph: 0,
            mult: 1,
            energy: 3000,
            maxEnergy: 3000,
            cards: {},
            customPromos: {} // База данных созданных админом промокодов
        };

        // Структура карточек с зависимостями и апгрейдом маны/клика
        const CARDS_DATA = [
            { id: 'm_btc', name: 'BTC Pairs', basePrice: 1000, baseProfit: 90, energyBonus: 100, clickBonus: 1, cat: 'markets', reqCard: null, reqLvl: 0, img: 'https://images.unsplash.com/photo-1621416894569-0f39ed31d247?auto=format&fit=crop&w=150&q=80' },
            { id: 'm_eth', name: 'ETH Pairs', basePrice: 15000, baseProfit: 1200, energyBonus: 250, clickBonus: 2, cat: 'markets', reqCard: 'm_btc', reqLvl: 3, img: 'https://images.unsplash.com/photo-1622790698141-94e304bcbb06?auto=format&fit=crop&w=150&q=80' },
            { id: 'm_sol', name: 'SOL Pairs', basePrice: 180000, baseProfit: 15000, energyBonus: 800, clickBonus: 5, cat: 'markets', reqCard: 'm_eth', reqLvl: 5, img: 'https://images.unsplash.com/photo-1639762681485-074b7f938ba0?auto=format&fit=crop&w=150&q=80' },
            { id: 'm_meme', name: 'Meme Tech Pro', basePrice: 2500000, baseProfit: 180000, energyBonus: 3000, clickBonus: 15, cat: 'markets', reqCard: 'm_sol', reqLvl: 7, img: 'https://images.unsplash.com/photo-1534447677768-be436bb09401?auto=format&fit=crop&w=150&q=80' },
            
            { id: 't_tg', name: 'Fenix Channel', basePrice: 2000, baseProfit: 150, energyBonus: 120, clickBonus: 1, cat: 'team', reqCard: null, reqLvl: 0, img: 'https://images.unsplash.com/photo-1614680376593-902f74fa0d41?auto=format&fit=crop&w=150&q=80' },
            { id: 't_youtube', name: 'Fenix Studio', basePrice: 35000, baseProfit: 2900, energyBonus: 400, clickBonus: 3, cat: 'team', reqCard: 't_tg', reqLvl: 4, img: 'https://images.unsplash.com/photo-1548372290-8d01b6c8e78c?auto=format&fit=crop&w=150&q=80' },
            { id: 't_tiktok', name: 'Viral Content', basePrice: 400000, baseProfit: 32000, energyBonus: 1500, clickBonus: 8, cat: 'team', reqCard: 't_youtube', reqLvl: 5, img: 'https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&w=150&q=80' },
            { id: 't_reddit', name: 'Global Reddit', basePrice: 6000000, baseProfit: 550000, energyBonus: 6000, clickBonus: 30, cat: 'team', reqCard: 't_tiktok', reqLvl: 6, img: 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&w=150&q=80' },
            
            { id: 'l_kyc', name: 'Global KYC', basePrice: 10000, baseProfit: 850, energyBonus: 200, clickBonus: 2, cat: 'legal', reqCard: null, reqLvl: 0, img: 'https://images.unsplash.com/photo-1557597774-9d273605dfa9?auto=format&fit=crop&w=150&q=80' },
            { id: 'l_sec', name: 'SEC Pass', basePrice: 120000, baseProfit: 11000, energyBonus: 900, clickBonus: 4, cat: 'legal', reqCard: 'l_kyc', reqLvl: 4, img: 'https://images.unsplash.com/photo-1589829545856-d10d557cf95f?auto=format&fit=crop&w=150&q=80' },
            { id: 'l_dubai', name: 'Dubai HQ Office', basePrice: 1800000, baseProfit: 160000, energyBonus: 4500, clickBonus: 20, cat: 'legal', reqCard: 'l_sec', reqLvl: 5, img: 'https://images.unsplash.com/photo-1512453979798-5ea266f8880c?auto=format&fit=crop&w=150&q=80' },
            { id: 'l_bank', name: 'Fenix Bank Corp', basePrice: 50000000, baseProfit: 4800000, energyBonus: 50000, clickBonus: 150, cat: 'legal', reqCard: 'l_dubai', reqLvl: 6, img: 'https://images.unsplash.com/photo-1601597111158-2fceff292cdc?auto=format&fit=crop&w=150&q=80' }
        ];

        CARDS_DATA.forEach(c => {
            if (game.cards[c.id] === undefined) game.cards[c.id] = 0;
        });

        if (userId === OWNER_ID || userId === 0) {
            document.getElementById('admin-zone').style.display = 'block';
        }

        function getTitleInfo(bal) {
            let lvl = Math.floor(Math.sqrt(bal / 35)) + 1;
            if (lvl > 250) lvl = 250;
            let name = "Хомяк-Феникс";
            if (lvl > 15) name = "Менеджер Маней";
            if (lvl > 45) name = "Крипто Инвестор";
            if (lvl > 90) name = "Золотой Магнат";
            if (lvl > 150) name = "Ультра Грандмастер";
            if (lvl > 210) name = "Бессмертный Овнер";
            return { lvl: lvl, text: `${name} (${lvl} ур)` };
        }

        function save() {
            localStorage.setItem('f_combat_v5_ultimate', JSON.stringify(game));
        }

        function updateUI() {
            document.getElementById('display-balance').innerText = Math.floor(game.balance).toLocaleString();
            document.getElementById('top-mult').innerText = '+' + game.mult;
            document.getElementById('top-pph').innerText = '+' + game.pph.toLocaleString();
            document.getElementById('current-energy').innerText = Math.floor(game.energy);
            document.getElementById('max-energy').innerText = game.maxEnergy;
            
            let fillPct = (game.energy / game.maxEnergy) * 100;
            document.getElementById('energy-fill-bar').style.width = fillPct + '%';

            let tInfo = getTitleInfo(game.balance);
            document.getElementById('player-league').innerText = tInfo.text;
            document.getElementById('profile-title-num').innerText = tInfo.lvl + " / 250";
        }

        function renderCards() {
            const grids = { markets: 'grid-markets', team: 'grid-team', legal: 'grid-legal' };
            Object.values(grids).forEach(id => document.getElementById(id).innerHTML = '');

            CARDS_DATA.forEach(c => {
                let currentLvl = game.cards[c.id] || 0;
                // Множитель экспоненциального роста цены для 500+ уровней
                let currentPrice = Math.floor(c.basePrice * Math.pow(1.68, currentLvl));
                let currentProfit = c.baseProfit * (currentLvl + 1);

                let isLocked = false;
                let lockText = "";
                if (c.reqCard) {
                    let parentLvl = game.cards[c.reqCard] || 0;
                    if (parentLvl < c.reqLvl) {
                        isLocked = true;
                        let parentName = CARDS_DATA.find(x => x.id === c.reqCard).name;
                        lockText = `Нужен ${parentName} ${c.reqLvl} ур.`;
                    }
                }

                let btnHtml = isLocked 
                    ? `<button class="card-buy-btn" disabled>${lockText}</button>`
                    : `<button class="card-buy-btn" id="btn-${c.id}" onclick="buyUpgrade('${c.id}', ${currentPrice}, ${c.baseProfit}, ${c.energyBonus}, ${c.clickBonus})">🪙 ${currentPrice.toLocaleString()}</button>`;

                let cardHtml = `
                    <div class="card ${isLocked ? 'locked' : ''}">
                        <div class="card-lvl">Lvl ${currentLvl}</div>
                        <div class="card-img-wrapper">
                            <img src="${c.img}" alt="${c.name}">
                        </div>
                        <div class="card-name">${c.name}</div>
                        <div class="card-desc">Доход +${c.baseProfit}/ч<br>⚡ Мана +${c.energyBonus}<br>⚡ Клик +${c.clickBonus}</div>
                        <div class="card-profit-val">+${currentProfit.toLocaleString()}/ч</div>
                        ${btnHtml}
                    </div>
                `;
                document.getElementById(grids[c.cat]).insertAdjacentHTML('beforeend', cardHtml);
                
                if(!isLocked && game.balance < currentPrice) {
                    document.getElementById(`btn-${c.id}`).disabled = true;
                }
            });
        }

        window.buyUpgrade = function(id, price, profitAdd, energyAdd, clickAdd) {
            if (game.balance >= price) {
                game.balance -= price;
                game.cards[id]++;
                game.pph += profitAdd;
                game.maxEnergy += energyAdd; // Мана растет!
                game.mult += clickAdd;       // Сила клика растет!
                save();
                updateUI();
                renderCards();
            }
        };

        document.getElementById('main-tap-target').addEventListener('click', () => {
            if (game.energy >= game.mult) {
                game.energy -= game.mult;
                game.balance += game.mult;
                updateUI();
                save();
            }
        });

        window.navigate = function(screenId, element) {
            document.querySelectorAll('.main-content').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            element.classList.add('active');
            if (screenId === 'screen-upgrades') renderCards();
        };

        window.switchCategory = function(catId, element) {
            document.querySelectorAll('.category-block').forEach(b => b.style.display = 'none');
            document.querySelectorAll('.sub-tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(catId).style.display = 'block';
            element.classList.add('active');
        };

        // АКТИВАЦИЯ КОДОВ (ОБЫЧНЫХ И КАСТОМНЫХ АДМИНСКИХ)
        window.usePromoCode = function() {
            let code = document.getElementById('promo-field').value.trim().toUpperCase();
            
            if (code === 'FENIX2026') {
                game.balance += 500000;
                save(); updateUI();
                alert('Промокод принят: +500,000 маней!');
                document.getElementById('promo-field').value = '';
                return;
            }

            // Проверка созданных админом промокодов
            if (game.customPromos && game.customPromos[code]) {
                let reward = game.customPromos[code];
                game.balance += reward;
                delete game.customPromos[code]; // Одноразовый код
                save(); updateUI();
                alert(`Успешно! Активирован промокод создателя на +${reward.toLocaleString()} маней!`);
            } else {
                alert('Код не существует или уже использован!');
            }
            document.getElementById('promo-field').value = '';
        };

        // ФУНКЦИИ АДМИНИСТРАТОРА (ID 810823857)
        window.adminGiveMoney = function(amount) { game.balance += amount; save(); updateUI(); };
        window.adminGivePPH = function(amount) { game.pph += amount; save(); updateUI(); };
        window.adminResetAll = function() { localStorage.removeItem('f_combat_v5_ultimate'); location.reload(); };
        
        window.adminCreatePromo = function() {
            let name = document.getElementById('adm-promo-name').value.trim().toUpperCase();
            let reward = parseInt(document.getElementById('adm-promo-reward').value);

            if (name && reward > 0) {
                if (!game.customPromos) game.customPromos = {};
                game.customPromos[name] = reward;
                save();
                alert(`Промокод "${name}" на сумму ${reward} успешно создан! Передай его игрокам.`);
                document.getElementById('adm-promo-name').value = '';
                document.getElementById('adm-promo-reward').value = '';
            } else {
                alert('Заполни все поля корректно!');
            }
        };

        setInterval(() => {
            if (game.pph > 0) {
                game.balance += (game.pph / 3600);
            }
            if (game.energy < game.maxEnergy) {
                let regen = 5 + Math.floor(game.pph / 100000);
                game.energy = Math.min(game.maxEnergy, game.energy + regen);
            }
            updateUI();
            save();
        }, 1000);

        updateUI();
    </script>
</body>
</html>
