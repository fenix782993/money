<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fenix Combat Fire & Glory</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0b0502;
            --panel-bg: #1c0f0a;
            --border-color: #422113;
            --accent-orange: #ff5500;
            --neon-gold: #ffb700;
            --text-muted: #9c7f70;
            --lock-color: #ff3b30;
            --success-color: #00ff66;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .top-bar {
            background: linear-gradient(180deg, #30170a 0%, var(--bg-color) 100%);
            padding: 14px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border-color);
            box-shadow: 0 4px 25px rgba(255, 85, 0, 0.2);
        }

        .league-badge {
            background: rgba(255, 85, 0, 0.15);
            border: 1px solid var(--accent-orange);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 800;
            color: var(--neon-gold);
            text-transform: uppercase;
            box-shadow: 0 0 12px rgba(255, 85, 0, 0.3);
        }

        .stats-container {
            display: flex;
            gap: 14px;
        }

        .stat-box {
            text-align: right;
        }

        .stat-box .val {
            font-size: 13px;
            font-weight: bold;
            color: #ffffff;
        }

        .stat-box .lbl {
            font-size: 9px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: none;
        }

        .main-content.active {
            display: block;
        }

        #screen-clicker {
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: calc(100vh - 150px);
        }

        .score-val {
            font-size: 46px;
            font-weight: 900;
            background: linear-gradient(180deg, #ffffff 0%, var(--neon-gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(255,85,0,0.5));
        }

        .circle-wrapper {
            margin: auto;
            position: relative;
            width: 220px;
            height: 220px;
        }

        .click-circle {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle, #4a1d05 0%, #0d0502 100%);
            border: 4px solid #5e2c0d;
            box-shadow: 0 0 50px rgba(255, 85, 0, 0.6), inset 0 0 20px rgba(255, 183, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.05s ease;
        }

        .click-circle:active {
            transform: scale(0.94);
            box-shadow: 0 0 65px var(--neon-gold);
        }

        .click-circle img {
            width: 80%;
            height: 80%;
            object-fit: contain;
            filter: drop-shadow(0 0 20px rgba(255,85,0,0.7));
        }

        .energy-container {
            background: linear-gradient(135deg, var(--panel-bg) 0%, #29150c 100%);
            border: 1px solid var(--border-color);
            padding: 12px
